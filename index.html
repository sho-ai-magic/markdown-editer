<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markdownエディタ</title>
<meta name="theme-color" content="#f2f2f2">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="vendor/codemirror/codemirror.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="toolbar">
  <button id="btn-toc" class="tool-btn" title="目次の表示/非表示">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
    <span class="btn-label">目次</span>
  </button>
  <span id="file-name">無題.md</span>
  <span id="dirty-mark" hidden title="未保存の変更があります">●</span>
  <span class="spacer"></span>
  <button id="btn-open" class="tool-btn" title="ファイルを開く (Ctrl+O)">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v1H5z"/><path d="M3 8l1.5 10a2 2 0 0 0 2 1.7h11a2 2 0 0 0 2-1.7L21 8"/></svg>
    <span class="btn-label">開く</span>
  </button>
  <button id="btn-save" class="tool-btn" title="上書き保存 (Ctrl+S)">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M8 3v5h7V3"/><rect x="7" y="13" width="10" height="7"/></svg>
    <span class="btn-label">保存</span>
  </button>
  <button id="btn-save-as" class="tool-btn" title="名前を付けて保存 (Ctrl+Shift+S)">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h8l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M8 3v4h5V3"/><rect x="7" y="12" width="6" height="8"/><path d="M16.5 15.5l2 2L22 14l-2-2z"/></svg>
    <span class="btn-label">名前を付けて保存</span>
  </button>
  <button id="btn-settings" class="tool-btn" title="色の設定">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.4M12 18.6V21M21 12h-2.4M5.4 12H3M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7M18.4 18.4l-1.7-1.7M7.3 7.3L5.6 5.6"/></svg>
    <span class="btn-label">設定</span>
  </button>
  <button id="btn-theme" class="tool-btn" title="テーマ切替">
    <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
    <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"/></svg>
  </button>
</header>

<div id="view-switch" role="tablist" aria-label="表示切替">
  <button class="view-tab active" data-view="editor" role="tab" aria-selected="true">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20l1-4L16 5l3 3L8 19l-4 1z"/><path d="M14 7l3 3"/></svg>
    編集
  </button>
  <button class="view-tab" data-view="preview" role="tab" aria-selected="false">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
    プレビュー
  </button>
</div>

<main id="main">
  <nav id="toc" aria-label="目次">
    <div id="toc-title">目次</div>
    <ul id="toc-list"></ul>
  </nav>
  <div id="toc-backdrop"></div>
  <section id="editor-pane" aria-label="編集画面">
    <div id="format-toolbar" role="toolbar" aria-label="書式ツールバー">
      <button class="fmt-btn" data-fmt="bold" title="太字 (Ctrl+B)"><b>B</b></button>
      <button class="fmt-btn" data-fmt="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
      <button class="fmt-btn" data-fmt="strike" title="取り消し線"><s>S</s></button>
      <button class="fmt-btn" data-fmt="heading" title="見出し（クリックでH1→H2→H3→解除と切り替え）" aria-label="見出し">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4v16M15 4v16M5 12h10"/></svg>
      </button>
      <span class="fmt-sep"></span>
      <button class="fmt-btn" data-fmt="ul" title="箇条書き" aria-label="箇条書き">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="4" cy="6" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="12" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="18" r="1.3" fill="currentColor" stroke="none"/>
          <path d="M9 6h11M9 12h11M9 18h11"/>
        </svg>
      </button>
      <button class="fmt-btn" data-fmt="ol" title="番号付きリスト" aria-label="番号付きリスト">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <text x="1.5" y="8.2" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">1</text>
          <text x="1.5" y="14.2" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">2</text>
          <text x="1.5" y="20.2" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">3</text>
          <path d="M9 6h11M9 12h11M9 18h11"/>
        </svg>
      </button>
      <button class="fmt-btn" data-fmt="task" title="タスクリスト" aria-label="タスクリスト">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4.5" width="5" height="5" rx="1"/>
          <path d="M4.3 7l1 1 2-2.2"/>
          <rect x="3" y="14.5" width="5" height="5" rx="1"/>
          <path d="M12 7h9M12 17h9"/>
        </svg>
      </button>
      <button class="fmt-btn" data-fmt="quote" title="引用" aria-label="引用">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4v16"/><path d="M10 8h9M10 13h9M10 18h6"/></svg>
      </button>
      <span class="fmt-sep"></span>
      <button class="fmt-btn" data-fmt="code" title="コード" aria-label="コード">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l-5 6 5 6"/><path d="M15 6l5 6-5 6"/></svg>
      </button>
      <button class="fmt-btn" data-fmt="table" title="表を挿入" aria-label="表を挿入">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M3 16h18M9 4v16M15 4v16"/></svg>
      </button>
      <button class="fmt-btn" data-fmt="link" title="リンク" aria-label="リンク">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 14.5l5-5"/><path d="M8 16.5A3.5 3.5 0 0 1 8 9l2-2"/><path d="M16 7.5A3.5 3.5 0 0 1 16 15l-2 2"/></svg>
      </button>
      <span class="spacer"></span>
      <span id="char-count" title="文字数と、AIチャット等に貼り付ける際の目安トークン数（概算値）">0文字 / 約0トークン</span>
      <button id="btn-copy-md" class="fmt-btn fmt-btn-text" title="Markdownソースをプレーンテキストとしてコピー">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="6" width="12" height="15" rx="2"/><path d="M9 6V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V6"/></svg>
        <span class="btn-label">コピー</span>
      </button>
      <button id="btn-copy-rich" class="fmt-btn fmt-btn-text" title="書式付き(リッチテキスト)でコピー。Googleドキュメント等に貼り付けると見出し・太字・表がそのまま反映されます">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="6" width="12" height="15" rx="2"/><path d="M9 6V4.5A1.5 1.5 0 0 1 10.5 3h3A1.5 1.5 0 0 1 15 4.5V6"/><path d="M10 11h6M10 14h6M10 17h3"/></svg>
        <span class="btn-label">書式付き</span>
      </button>
    </div>
    <div id="editor-host"></div>
  </section>
  <section id="preview-pane" aria-label="プレビュー画面">
    <article id="preview"></article>
  </section>
</main>

<div id="settings-overlay" hidden>
  <div id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <h2 id="settings-title">色の設定</h2>
    <div class="setting-row">
      <label for="color-heading">見出しの色</label>
      <input type="color" id="color-heading" data-color-key="heading">
    </div>
    <div class="setting-row">
      <label for="color-list">リストの色</label>
      <input type="color" id="color-list" data-color-key="list">
    </div>
    <div class="setting-row">
      <label for="color-quote">引用の色</label>
      <input type="color" id="color-quote" data-color-key="quote">
    </div>
    <div class="setting-row">
      <label for="color-code">コードの色</label>
      <input type="color" id="color-code" data-color-key="code">
    </div>
    <div class="setting-row">
      <label for="color-table-border">表の罫線の色</label>
      <input type="color" id="color-table-border" data-color-key="tableBorder">
    </div>
    <div class="settings-actions">
      <button id="btn-reset-colors">既定の色に戻す</button>
      <button id="btn-close-settings">閉じる</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>

<script src="vendor/codemirror/codemirror.js"></script>
<script src="vendor/markdown-it.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
